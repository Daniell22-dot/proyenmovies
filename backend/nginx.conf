# ProyenMovies - High Performance Nginx Configuration
# This configuration enables Load Balancing, Reverse Proxying, and Gzip Compression.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Gzip Compression for JSON/JS/CSS assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream: Load Balancing across multiple backend instances
    upstream proyen_api_cluster {
        # Least connections algorithm for better balancing
        least_conn;
        
        # Define multiple backend instances for horizontal scaling
        server 127.0.0.1:5000;
        # server 127.0.0.1:5001; # Example secondary instance
        # server 127.0.0.1:5002; # Example tertiary instance
    }

    server {
        listen 80;
        server_name proyenmovies.com; # Change to your domain

        # Redirect HTTP to HTTPS in production
        # return 301 https://$host$request_uri;

        location /api/v1/ {
            # Proxy headers for security and logging
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Direct traffic to the upstream cluster
            proxy_pass http://proyen_api_cluster;

            # Support for long-running movie uploads
            client_max_body_size 500M;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Socket.io Support
        location /socket.io/ {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_pass http://proyen_api_cluster;
        }

        # Serve static uploads directly for performance
        location /uploads/ {
            alias /path/to/Media_site/backend/uploads/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Default: Proxy everything else to Next.js Frontend (Port 3000)
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
